<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GEOPOL MONITOR V3.1</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #040a0f; --panel: rgba(10, 25, 41, 0.9); --border: #1c3d5a;
        --accent: #00d4ff; --red: #ff3b3b; --yellow: #ffd600; --text: #e0f2f1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
        background: var(--bg); color: var(--text); font-family: 'Orbitron', sans-serif; 
        overflow: hidden; height: 100vh; background-image: radial-gradient(circle at center, #0a1f33 0%, #040a0f 100%);
    }
    .app-container {
        display: grid; grid-template-columns: 280px 1fr 320px; grid-template-rows: 70px 1fr 60px;
        height: 100vh; padding: 10px; gap: 10px;
    }
    header {
        grid-column: 1 / 4; display: flex; align-items: center; background: var(--panel); 
        border: 1px solid var(--border); padding: 0 20px; justify-content: space-between; border-radius: 4px;
    }
    .defcon-box { border: 1px solid var(--yellow); padding: 5px 20px; color: var(--yellow); font-weight: bold; }
    .sidebar-left { grid-row: 2 / 3; display: flex; flex-direction: column; gap: 8px; }
    .threat-btn {
        background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 12px;
        text-align: left; border-radius: 4px; font-size: 11px; cursor: pointer;
    }
    .threat-btn.active { border-color: var(--red); color: var(--red); }
    .map-area {
        grid-row: 2 / 3; background: var(--panel); border: 1px solid var(--border);
        position: relative; overflow: hidden; border-radius: 4px;
    }
    .alerts-panel {
        grid-row: 2 / 3; background: var(--panel); border: 1px solid var(--border);
        display: flex; flex-direction: column; border-radius: 4px;
    }
    .alert-item {
        background: rgba(255, 59, 59, 0.05); border: 1px solid rgba(255, 59, 59, 0.2);
        padding: 10px; margin-bottom: 8px; font-family: 'Share Tech Mono'; font-size: 12px;
    }
    .ticker-area {
        grid-column: 1 / 4; background: var(--panel); border: 1px solid var(--border);
        display: flex; align-items: center; overflow: hidden; border-radius: 4px;
    }
    .ticker-text { white-space: nowrap; animation: scroll 30s linear infinite; font-family: 'Share Tech Mono'; color: var(--accent); }
    @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    .marker {
        position: absolute; width: 12px; height: 12px; background: var(--red);
        border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 15px var(--red);
    }
</style>
</head>
<body>
<div class="app-container">
    <header>
        <div style="font-size: 20px; font-weight: 900; color: var(--accent);">◈ GEOPOL MONITOR <span style="font-size:10px">V3.1</span></div>
        <div class="defcon-box">DEFCON 3</div>
        <div id="clock" style="font-family:'Share Tech Mono'; color:var(--accent)">00:00:00</div>
    </header>
    <aside class="sidebar-left">
        <button class="threat-btn active">🚀 IRAN ATTACKS</button>
        <button class="threat-btn">📡 INTEL ACCESS</button>
        <button class="threat-btn">🎯 CONFLICT ZONES</button>
        <button class="threat-btn">⚔ MILITARY BASES</button>
        <button class="threat-btn">☢ NUCLEAR SITES</button>
    </aside>
    <main class="map-area" id="map">
        <svg viewBox="0 0 1000 500" style="width:100%; height:100%; opacity:0.3">
            <path fill="#1c3d5a" d="M150,150 Q250,100 350,180 T300,350 T150,300 Z M600,100 Q700,50 800,100 T900,200 T850,350 T650,400 T550,250 Z" />
        </svg>
        <div id="markers"></div>
    </main>
    <aside class="alerts-panel">
        <div style="padding:10px; font-size:12px; color:var(--accent); border-bottom:1px solid var(--border)">LIVE ALERTS</div>
        <div id="alerts-list" style="flex:1; overflow-y:auto; padding:10px"></div>
    </aside>
    <footer class="ticker-area">
        <div class="ticker-text" id="ticker">CARGANDO FEED GLOBAL DE INTELIGENCIA GDELT PRO...</div>
    </footer>
</div>
<script>
    const LOCS = { "israel":{x:55,y:35}, "iran":{x:62,y:32}, "ucrania":{x:54,y:22}, "china":{x:80,y:30}, "russia":{x:65,y:15} };
    async function fetchIntel() {
        try {
            const res = await fetch('https://api.gdeltproject.org/api/v2/doc/doc?query=(geopolitics OR military)&mode=artlist&maxrecords=10&format=json');
            const data = await res.json();
            const list = document.getElementById('alerts-list');
            const markers = document.getElementById('markers');
            list.innerHTML = ''; markers.innerHTML = '';
            let tText = '';
            data.articles.forEach(art => {
                const div = document.createElement('div');
                div.className = 'alert-item';
                div.innerHTML = `[ALERTA] ${art.title.substring(0,60)}...`;
                list.appendChild(div);
                tText += ` • ${art.title.toUpperCase()} `;
                const txt = art.title.toLowerCase();
                for(let k in LOCS) {
                    if(txt.includes(k)) {
                        const m = document.createElement('div');
                        m.className = 'marker';
                        m.style.left = LOCS[k].x+'%'; m.style.top = LOCS[k].y+'%';
                        markers.appendChild(m);
                    }
                }
            });
            document.getElementById('ticker').textContent = tText;
        } catch(e) {}
    }
    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
    fetchIntel();
    setInterval(fetchIntel, 60000);
</script>
</body>
</html>
